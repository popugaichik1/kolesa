# Source: kolesa-platform/templates/app.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kolesa-auth
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/instance: kolesa
    app.kubernetes.io/part-of: kolesa-platform
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: auth
      app.kubernetes.io/instance: kolesa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth
        app.kubernetes.io/instance: kolesa
        app.kubernetes.io/part-of: kolesa-platform
    spec:
      containers:
        - name: auth
          image: auth-service:1.0.0
          imagePullPolicy: Never
          ports:
            - containerPort: 5050
          env:
            - name: HTTP_ADDR
              value: ":5050"
            - name: ACCESS_TOKEN_EXPIRY
              value: "15m"
            - name: ALLOWED_ORIGINS
              value: "*"
            - name: HTTP_SHUTDOWN_TIMEOUT
              value: "30s"
            - name: LOGGER_FOLDER
              value: "/app/out/logs"
            - name: LOGGER_LEVEL
              value: "INFO"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_TIMEOUT
              value: "5s"
            - name: REFRESH_TOKEN_EXPIRY
              value: "168h"
            - name: TIME_ZONE
              value: "UTC"
            - name: POSTGRES_HOST
              value: kolesa-auth-postgres
            - name: POSTGRES_USER
              value: "auth_user"
            - name: POSTGRES_DB
              value: "auth_db"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kolesa-auth-postgres
                  key: password
            - name: KAFKA_BROKERS
              value: "test-kafka:9092"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kolesa-auth
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/auth/health
              port: 5050
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/auth/health
              port: 5050
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
