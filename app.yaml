# Source: kolesa-platform/templates/postgres.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kolesa-auth-postgres
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/instance: kolesa
    app.kubernetes.io/part-of: kolesa-platform
spec:
  serviceName: kolesa-auth-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-postgres
      app.kubernetes.io/instance: kolesa
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-postgres
        app.kubernetes.io/instance: kolesa
        app.kubernetes.io/part-of: kolesa-platform
    spec:
      containers:
        - name: postgres
          image: postgres:18.1-bookworm
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "auth_user"
            - name: POSTGRES_DB
              value: "auth_db"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kolesa-auth-postgres
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "auth_user", "-d", "auth_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "auth_user", "-d", "auth_db"]
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
