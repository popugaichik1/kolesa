apiVersion: batch/v1
kind: Job
metadata:
  name: kolesa-auth-migrate
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/instance: kolesa
    app.kubernetes.io/part-of: kolesa-platform
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth
        app.kubernetes.io/instance: kolesa
        app.kubernetes.io/part-of: kolesa-platform
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: migrate/migrate:v4.19.1
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "postgres://auth_user:$(POSTGRES_PASSWORD)@kolesa-auth-postgres:5432/auth_db?sslmode=disable"
            - "up"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kolesa-auth-postgres
                  key: password
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: kolesa-auth-migrations
