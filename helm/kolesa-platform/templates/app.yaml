{{- range $key, $svc := .Values.services }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kolesa.appName" (dict "root" $ "key" $key) }}
  labels:
    {{- include "kolesa.labels" (dict "root" $ "key" $key) | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := $svc.secretEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kolesa.appName" (dict "root" $ "key" $key) }}
  labels:
    {{- include "kolesa.labels" (dict "root" $ "key" $key) | nindent 4 }}
spec:
  replicas: {{ $svc.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $key }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
  template:
    metadata:
      labels:
        {{- include "kolesa.labels" (dict "root" $ "key" $key) | nindent 8 }}
    spec:
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $key }}
          image: {{ include "kolesa.image" (dict "root" $ "svc" $svc) }}
          imagePullPolicy: {{ $svc.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.containerPort }}
          env:
            - name: HTTP_ADDR
              value: ":{{ $svc.containerPort }}"
            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if $svc.postgres.enabled }}
            - name: POSTGRES_HOST
              value: {{ include "kolesa.postgresName" (dict "root" $ "key" $key) }}
            - name: POSTGRES_USER
              value: {{ $svc.postgres.username | quote }}
            - name: POSTGRES_DB
              value: {{ $svc.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kolesa.postgresName" (dict "root" $ "key" $key) }}
                  key: password
            {{- end }}
            - name: KAFKA_BROKERS
              value: {{ $.Values.global.kafkaBrokers | quote }}
            {{- if (and $svc.redis $svc.redis.enabled) }}
            - name: REDIS_HOST
              value: {{ include "kolesa.redisName" (dict "root" $) }}
            - name: REDIS_PORT
              value: {{ $svc.redis.port | quote }}
            - name: REDIS_TIMEOUT
              value: {{ $svc.redis.timeout | quote }}
            {{- end }}
            {{- range $k, $v := $svc.secretEnv }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "kolesa.appName" (dict "root" $ "key" $key) }}
                  key: {{ $k }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ $svc.routePath }}/health
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ $svc.routePath }}/health
              port: {{ $svc.containerPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kolesa.appName" (dict "root" $ "key" $key) }}
  labels:
    {{- include "kolesa.labels" (dict "root" $ "key" $key) | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ $key }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
  ports:
    - port: 80
      targetPort: {{ $svc.containerPort }}
{{- if $svc.postgres.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kolesa.appName" (dict "root" $ "key" $key) }}-migrations
  labels:
    {{- include "kolesa.labels" (dict "root" $ "key" $key) | nindent 4 }}
data:
  {{- range $path, $_ := $.Files.Glob (printf "files/migrations/%s/*.sql" $key) }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kolesa.appName" (dict "root" $ "key" $key) }}-migrate
  labels:
    {{- include "kolesa.labels" (dict "root" $ "key" $key) | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        {{- include "kolesa.labels" (dict "root" $ "key" $key) | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: migrate/migrate:v4.19.1
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "postgres://{{ $svc.postgres.username }}:$(POSTGRES_PASSWORD)@{{ include "kolesa.postgresName" (dict "root" $ "key" $key) }}:5432/{{ $svc.postgres.database }}?sslmode=disable"
            - "up"
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kolesa.postgresName" (dict "root" $ "key" $key) }}
                  key: password
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: {{ include "kolesa.appName" (dict "root" $ "key" $key) }}-migrations
{{- end }}
{{- end }}
