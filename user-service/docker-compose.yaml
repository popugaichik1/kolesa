services:
  user-service:
    build:
      context: .
      dockerfile: ./cmd/Dockerfile
    container_name: user-service
    env_file:
      - ./.env
    environment:
      - HTTP_ADDR=:5050
      - POSTGRES_HOST=user-postgres
      - LOGGER_FOLDER=/app/out/logs
    volumes:
      - ./out/logs:/app/out/logs
    ports:
      - "5051:5050"
      #в случае ошибки происходит перезапуск контейнера, что позволяет избежать простоев приложения
    restart: always

    networks:
      - microservices-network

  user-postgres:
    image: postgres:18.1-bookworm
    container_name: user-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./out/pgdata:/var/lib/postgresql
    restart: always

    networks:
      - microservices-network

  user-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ./migrations:/migrations
    networks:
      - microservices-network

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: user-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:user-postgres:5432
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - microservices-network

  swagger:
    build:
      context: .
      dockerfile_inline: |
        FROM golang:1.24.1-alpine
        RUN apk add --no-cache git
        RUN go install github.com/swaggo/swag/cmd/swag@v1.16.6
        WORKDIR /code
        ENTRYPOINT ["swag"]
    volumes:
      - .:/code
    networks:
      - microservices-network

networks:
  microservices-network:
    external: true
